<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us — FlopFilter</title>
<script defer data-domain="flopfilter.com" src="https://plausible.io/js/script.js"></script>
<style>
  :root {
    --bg: #0e1117; --panel: #161b26; --panel2: #1d2433; --border: #2a3347;
    --text: #e8ecf4; --muted: #8b95a8; --accent: #f5c518; --accent2: #4f8cff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font: 15px/1.5 -apple-system, "Segoe UI", Roboto, sans-serif; }
  header { padding: 20px 28px; }
  header a { text-decoration: none; }
  header h1 { font-size: 22px; color: var(--text); display: inline; }
  header h1 span { color: var(--accent); }
  .wrap { max-width: 560px; margin: 30px auto 60px; padding: 0 20px; }
  h2 { font-size: 20px; margin-bottom: 8px; }
  .lead { color: var(--muted); margin-bottom: 24px; }
  label { display: block; font-size: 13px; color: var(--muted); margin: 16px 0 5px; }
  input, textarea {
    width: 100%; background: var(--panel2); color: var(--text);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 14px; font-size: 15px; font-family: inherit; outline: none;
  }
  input:focus, textarea:focus { border-color: var(--accent2); }
  textarea { min-height: 140px; resize: vertical; }
  button {
    margin-top: 20px; background: var(--accent2); color: #fff; border: none;
    border-radius: 10px; padding: 11px 26px; font-size: 15px; font-weight: 600;
    cursor: pointer;
  }
  button:hover { filter: brightness(1.1); }
  .back { display: inline-block; margin-top: 26px; color: var(--accent2); text-decoration: none; font-size: 14px; }
  .back:hover { text-decoration: underline; }
</style>
</head>
<body>

<header>
  <a href="index.html"><h1>Flop<span>Filter</span></h1></a>
</header>

<div class="wrap">
  <h2>Contact Us</h2>
  <p class="lead">Found a bug? Missing a streaming service? Have an idea that would make
  FlopFilter better? We read every message.</p>

  <form action="https://formsubmit.co/36daca69fd4b57552298178ea431ba00" method="POST">
    <input type="hidden" name="_subject" value="FlopFilter feedback">
    <input type="text" name="_honey" style="display:none">

    <label for="name">Name (optional)</label>
    <input type="text" id="name" name="name" autocomplete="name">

    <label for="email">Email (optional — only if you'd like a reply)</label>
    <input type="email" id="email" name="email" autocomplete="email">

    <label for="message">Your feedback or suggestion</label>
    <textarea id="message" name="message" required
      placeholder="What's working? What's missing? What would make this your go-to?"></textarea>

    <button type="submit">Send feedback</button>
  </form>

  <a class="back" href="index.html">&larr; Back to FlopFilter</a>

  <p style="margin-top:40px; color:var(--muted); font-size:12px;">&copy; 2026 FlopFilter. All rights reserved.</p>
</div>

</body>
</html>
